<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#11d462",
            "background-light": "#f6f8f7",
            "background-dark": "#0a1a12", // Custom deep forest green as requested
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.5rem",
            "lg": "1rem",
            "xl": "1.5rem",
            "2xl": "2rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
      background-color: #0a1a12;
    }

    .glass-card {
      background: rgba(16, 34, 24, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(17, 212, 98, 0.1);
    }

    .organic-shape {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
    }
  </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen flex items-center justify-center overflow-hidden p-6">
  <!-- Background Organic Shapes -->
  <div class="organic-shape w-[500px] h-[500px] bg-primary/10 -top-20 -left-20"></div>
  <div class="organic-shape w-[400px] h-[400px] bg-emerald-900/30 bottom-0 right-0"></div>
  <div class="organic-shape w-[300px] h-[300px] bg-primary/5 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"></div>
  <div class="w-full max-w-[480px] z-10">
    <!-- Logo Section -->
    <div class="flex flex-col items-center mb-12">
      <div
        class="size-16 bg-primary/20 rounded-2xl flex items-center justify-center text-primary mb-4 border border-primary/30">
        <span class="material-symbols-outlined text-4xl">potted_plant</span>
      </div>
      <h2 class="text-slate-100 text-2xl font-bold tracking-tight">Luxe Landscape</h2>
    </div>
    <!-- Main Login Card -->
    <div class="glass-card rounded-2xl p-8 md:p-12 shadow-2xl border border-white/5">
      <div class="text-center mb-10">
        <h1 class="text-3xl font-bold text-slate-100 mb-3">Welcome Back</h1>
        <p class="text-slate-400 text-base">Enter your phone number to access your account</p>
      </div>
      <form class="space-y-6">
        <div class="space-y-2">
          <label class="text-sm font-medium text-slate-300 ml-1">Phone Number</label>
          <div class="flex gap-3">
            <!-- Country Code Select -->
            <div class="relative w-32 group">
              <select
                class="appearance-none w-full bg-emerald-900/20 border border-emerald-800/50 rounded-xl px-4 py-4 text-slate-100 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all cursor-pointer">
                <option value="+1">🇺🇸 +1</option>
                <option value="+44">🇬🇧 +44</option>
                <option value="+33">🇫🇷 +33</option>
                <option value="+971">🇦🇪 +971</option>
                <option value="+61">🇦🇺 +61</option>
              </select>
              <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                <span class="material-symbols-outlined text-xl">expand_more</span>
              </div>
            </div>
            <!-- Phone Input -->
            <div class="flex-1 relative">
              <input
                class="w-full bg-emerald-900/20 border border-emerald-800/50 rounded-xl px-5 py-4 text-slate-100 placeholder:text-slate-600 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all"
                placeholder="000 000 000" type="tel" />
            </div>
          </div>
        </div>
        <button
          class="w-full bg-primary hover:bg-emerald-400 text-emerald-950 font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2 group"
          type="submit">
          <span>Send OTP</span>
          <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
        </button>
      </form>
      <div class="mt-10 pt-8 border-t border-white/5 text-center">
        <p class="text-slate-400">
          Don't have an account?
          <a class="text-primary font-semibold hover:underline decoration-primary/30 underline-offset-4 ml-1"
            href="#">Sign Up</a>
        </p>
      </div>
    </div>
    <!-- Minimal Footer -->
    <div class="mt-12 flex justify-center gap-8 text-slate-500 text-xs uppercase tracking-widest font-medium">
      <a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
      <a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
      <a class="hover:text-primary transition-colors" href="#">Support</a>
    </div>
  </div>
  <!-- Background Image Layer (Abstract) -->
  <div class="fixed inset-0 opacity-10 pointer-events-none mix-blend-overlay">
    <img alt="abstract dark green tropical leaves pattern" class="w-full h-full object-cover"
      data-alt="abstract dark green tropical leaves pattern"
      src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLEJfFwy4ZplCv9HL3D0dBnuDQwtNt7LOvGzB2vbS-an8jHV1yImSGT4F8dRGhkjw4KXg6rrtouDMFf02D9-kAur9La9plH_qL0P0NzzPz8ywHCcr1vVc_5KtOV6EkG5ir2Kh0akOO_zxPGZBFJ4ehKjos7d6yXigMhLwckQ8MOkrAksrLuCrjqJIXcyyH1Mbf1LlzoYG5sJlbX7nZkl56euUwMzarzWCpFLBZenm82gHBaQd9W8oLbLnuoqFn2UjwicxMuGC3cMs" />
  </div>
</body>

</html>
